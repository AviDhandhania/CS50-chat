{% extends "layout.html" %} {% block title %} Room : {{ room.name }} {% endblock %} {% block main %}
<h1 class="mb-4">{{ room.name }}</h1>
<div id="messages" class="border rounded p-3 mb-3 bg-white" style="height: 400px; overflow-y: auto">
  {% for message in messages%}
  <div class="mb-2">
    <strong>{{ message.username }}</strong>
    <small class="text-muted"> {{ message.timestamp }} </small>
    <div>{{ message.content }}</div>
  </div>
  {% else %}
  <p class="text-muted">No messages yet. Say something!</p>
  {% endfor %}
</div>

<form id="message-form" class="d-flex gap-2">
  <input id="message-input" class="form-control" placeholder="Type a message." autocomplete="off" autofocus />
  <button class="btn btn-primary" type="submit">Send</button>
</form>

{% endblock %}
