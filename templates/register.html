{% extends "layout.html" %} {% block title %} Register {% endblock %} {% block main %}

<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4 text-center">Register</h2>

    <form action="/register" method="post">
      <div class="mb-3">
        <input class="form-control" autofocus placeholder="username" name="username" autocomplete="off" type="text" />
      </div>
      <div class="mb-3">
        <input class="form-control" placeholder="password" name="password" autocomplete="off" type="password" />
      </div>
      <div class="mb-3">
        <input class="form-control" placeholder="confirmation" name="confirmation" autocomplete="off" type="password" />
      </div>
      <button class="btn btn-primary w-100" type="submit">Register</button>
    </form>
  </div>
</div>
{% endblock %}
