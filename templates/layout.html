<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CS50 Chat{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/styles.css')}}" rel="stylesheet" />

    <!-- Specific styles -->
    {% block styles %} {% endblock %}
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <header>
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">CS50 Chat</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="container py-4 flex-grow-1">{% block main %} {% endblock %}</main>

    <!-- Footer -->
    <footer class="border-top py-3 mt-auto bg-white">
      <div class="container text-center text-muted">
        <small> CS50 Final Project • Flask • SQLite • Socket.IO </small>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>

    <!-- Custom JS -->
    {% block scripts %} {% endblock %}
  </body>
</html>
