{% extends "layout.html" %} {% block title %} Rooms {% endblock %} {% block main %}
<h1 class="mb-4">Chat Rooms</h1>
<form action="/rooms" method="post" class="mb-4 d-flex">
  <input class="form-control" name="name" placeholder="New room name" />
  <button class="btn btn-primary" type="submit">Create Room</button>
</form>
<div class="list-group">
  {% for room in rooms %}
  <a href="/room/{{ room.id }}" class="list-group-item list-group-item-action d-flex justify-content-between">
    <span>{{ room.name }}</span>
    <small class="text-muted">{{ room.created_at }}</small>
  </a>
  {% else %}
  <p class="text-muted">No rooms yet - create one above.</p>
  {% endfor %}
</div>

{% endblock %}
