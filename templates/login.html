{% extends "layout.html" %} {% block title %} Login {% endblock %} {% block main %}

<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4 text-center">Login</h2>

    <form action="/login" method="post">
      <div class="mb-3">
        <input class="form-control" autofocus placeholder="username" name="username" autocomplete="off" type="text" />
      </div>
      <div class="mb-3">
        <input class="form-control" placeholder="password" name="password" autocomplete="off" type="password" />
      </div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
  </div>
</div>
{% endblock %}
